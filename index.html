<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>GAA Stats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235;
    --border:#1e2d45; --text:#e8eef8; --text-dim:#6b7a99;
    --accent:#00d4ff; --green:#00e676; --red:#ff3d5a;
    --amber:#ffab40; --purple:#b388ff;
    --hold:350ms;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    background:#1a1a2e;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Inter',sans-serif;
  }

  /* ── PHONE SHELL ── */
  .shell {
    width:393px; height:852px;
    background:var(--bg);
    border-radius:54px; border:8px solid #2a2a3a;
    box-shadow:0 0 0 1px #444, 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #111;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .island {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:120px; height:34px; background:#000; border-radius:20px; z-index:100;
  }
  .app { display:flex; flex-direction:column; height:100%; padding-top:58px; }

  /* ── SCOREBOARD ── */
  .scoreboard {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:6px 16px 5px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .s-team { display:flex; flex-direction:column; align-items:center; }
  .s-lbl  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
  .s-gaa  { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; color:var(--text); }
  .s-pts  { font-size:10px; font-weight:700; color:var(--text-dim); }
  .s-mid  { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .s-qtr  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); }
  .s-clk  { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:1; color:var(--text); }
  .s-sta  { font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }

  /* ── QUARTER PILLS ── */
  .qrow {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:4px; padding:5px 10px; background:var(--bg); flex-shrink:0;
  }
  .qpill {
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:8px; padding:4px 2px; text-align:center;
    font-size:10px; font-weight:700; color:var(--text-dim);
    letter-spacing:1px; text-transform:uppercase;
  }
  .qpill.active { background:var(--accent); border-color:var(--accent); color:#000; }
  .qpill.done   { border-color:rgba(0,212,255,0.3); color:rgba(0,212,255,0.5); }

  /* ── TABS ── */
  .tabbar {
    display:grid; grid-template-columns:repeat(4,1fr);
    background:var(--surface); border-bottom:2px solid var(--border); flex-shrink:0;
  }
  .tab {
    padding:9px 4px 8px; text-align:center; cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-2px;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:border-color 0.2s;
  }
  .tab-ic { font-size:15px; line-height:1; }
  .tab-lb { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-dim); transition:color 0.2s; }
  .tab.active .tab-lb { color:var(--accent); }
  .tab.active { border-bottom-color:var(--accent); }

  /* ── LAST EVENT ── */
  .le-bar {
    height:18px; flex-shrink:0; background:var(--bg);
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .le-dot { width:7px; height:7px; border-radius:50%; display:none; flex-shrink:0; }
  .le-txt { font-size:10px; font-weight:700; color:var(--text-dim); }

  /* ── SWIPE VIEWPORT ── */
  .viewport { flex:1; overflow:hidden; position:relative; }
  .track {
    display:flex; height:100%;
    transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
    will-change:transform;
  }
  .page {
    flex:0 0 100%; height:100%;
    overflow-y:auto; padding:8px 10px 28px;
    display:flex; flex-direction:column; gap:7px;
  }

  /* ── EVENT BUTTON ── */
  .ebtn {
    position:relative; height:72px;
    border-radius:14px; border:1.5px solid;
    display:flex; align-items:center;
    overflow:hidden; flex-shrink:0;
    touch-action:none; user-select:none; -webkit-user-select:none;
    cursor:pointer;
  }

  /* fill sweeps left→right over --hold duration */
  .efill {
    position:absolute; inset:0;
    transform:scaleX(0); transform-origin:left center;
    border-radius:inherit; pointer-events:none; z-index:1;
    opacity:0; transition:opacity 0.1s;
  }
  .ebtn.pressing .efill {
    opacity:1;
    transform:scaleX(1);
    transition:transform var(--hold) linear, opacity 0.1s;
  }
  .ebtn.fired .efill {
    opacity:0; transform:scaleX(1);
    transition:opacity 0.3s, transform 0s;
  }

  /* zone badge top-right */
  .ezbadge {
    position:absolute; top:6px; right:8px; z-index:3;
    font-size:11px; font-weight:900; letter-spacing:1px;
    border-radius:6px; padding:2px 7px;
    pointer-events:none;
    opacity:0; transition:opacity 0.15s;
  }
  .ebtn.pressing .ezbadge,
  .ebtn.fired    .ezbadge { opacity:1; }

  /* inner layout */
  .einner {
    position:relative; z-index:2;
    display:flex; align-items:center;
    width:100%; padding:0 14px; pointer-events:none;
  }
  .ecount {
    font-family:'Bebas Neue',sans-serif; font-size:42px;
    line-height:1; width:48px; text-align:center; flex-shrink:0;
    transition:transform 0.18s;
  }
  .ediv {
    width:1px; height:38px; background:rgba(255,255,255,0.08);
    margin:0 14px; flex-shrink:0;
  }
  .einfo { flex:1; }
  .ename {
    font-size:15px; font-weight:800; color:var(--text);
    line-height:1.2; text-transform:uppercase; letter-spacing:0.2px;
  }
  .ehint {
    font-size:9px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; margin-top:5px; opacity:0.3;
  }

  /* colour themes */
  .cg { background:linear-gradient(145deg,#0d2010,#0a1a0d); border-color:#1a4020; }
  .cg .ecount,.cg .ehint,.cg .ezbadge { color:#00e676; }
  .cg .efill  { background:rgba(0,230,118,0.25); }
  .cg .ezbadge{ background:rgba(0,230,118,0.2); }

  .cy { background:linear-gradient(145deg,#1a1500,#131000); border-color:#3a3000; }
  .cy .ecount,.cy .ehint,.cy .ezbadge { color:#ffe082; }
  .cy .efill  { background:rgba(255,224,130,0.25); }
  .cy .ezbadge{ background:rgba(255,224,130,0.2); }

  .cr { background:linear-gradient(145deg,#200d0d,#1a0a0a); border-color:#401a1a; }
  .cr .ecount,.cr .ehint,.cr .ezbadge { color:#ff3d5a; }
  .cr .efill  { background:rgba(255,61,90,0.25); }
  .cr .ezbadge{ background:rgba(255,61,90,0.2); }

  .co { background:linear-gradient(145deg,#1a0f00,#140b00); border-color:#3a2000; }
  .co .ecount,.co .ehint,.co .ezbadge { color:#ffab40; }
  .co .efill  { background:rgba(255,171,64,0.25); }
  .co .ezbadge{ background:rgba(255,171,64,0.2); }

  .cp { background:linear-gradient(145deg,#150d20,#100a1a); border-color:#301a40; }
  .cp .ecount,.cp .ehint,.cp .ezbadge { color:#b388ff; }
  .cp .efill  { background:rgba(179,136,255,0.25); }
  .cp .ezbadge{ background:rgba(179,136,255,0.2); }

  .cb { background:linear-gradient(145deg,#0d1520,#0a1018); border-color:#1a2a40; }
  .cb .ecount,.cb .ehint,.cb .ezbadge { color:#00d4ff; }
  .cb .efill  { background:rgba(0,212,255,0.25); }
  .cb .ezbadge{ background:rgba(0,212,255,0.2); }

  .cgr{ background:linear-gradient(145deg,#141820,#0f1218); border-color:#252e40; }
  .cgr .ecount,.cgr .ehint,.cgr .ezbadge { color:#8a9bb5; }
  .cgr .efill  { background:rgba(138,155,181,0.25); }
  .cgr .ezbadge{ background:rgba(138,155,181,0.2); }

  /* page dots */
  .dots {
    position:absolute; bottom:8px; left:0; right:0;
    display:flex; justify-content:center; gap:6px;
    pointer-events:none; z-index:10;
  }
  .dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.15);
    transition:background 0.2s, transform 0.2s;
  }
  .dot.active { background:var(--accent); transform:scale(1.3); }

  /* ── TOOLBAR ── */
  .toolbar {
    display:grid; grid-template-columns:repeat(5,1fr);
    gap:5px; padding:6px 10px 28px;
    background:var(--surface); border-top:1px solid var(--border); flex-shrink:0;
  }
  .tbtn {
    padding:9px 4px 8px; border-radius:10px; border:1.5px solid;
    text-align:center; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; line-height:1;
  }
  .tbtn:active { opacity:0.6; }
  .tic { font-size:14px; }
  .tlb { font-size:8px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; }
  #tb-flow  { background:rgba(0,230,118,0.12);  border-color:rgba(0,230,118,0.45);  color:var(--green); }
  #tb-pause { background:rgba(255,171,64,0.12); border-color:rgba(255,171,64,0.4);  color:var(--amber); }
  #tb-undo  { background:rgba(255,61,90,0.12);  border-color:rgba(255,61,90,0.4);   color:var(--red); }
  #tb-stats { background:rgba(0,212,255,0.12);  border-color:rgba(0,212,255,0.4);   color:var(--accent); }
  #tb-csv   { background:rgba(179,136,255,0.12);border-color:rgba(179,136,255,0.4); color:var(--purple); }

  /* ── TOAST ── */
  #toast {
    position:absolute; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:6px 18px;
    font-size:12px; font-weight:600; color:var(--text-dim);
    opacity:0; transition:all 0.22s; white-space:nowrap;
    z-index:50; pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="shell">
  <div class="island"></div>
  <div class="app">

    <!-- SCOREBOARD -->
    <div class="scoreboard">
      <div class="s-team">
        <div class="s-lbl">Us</div>
        <div class="s-gaa" id="sc-us">0-00</div>
        <div class="s-pts" id="sc-us-p">(0)</div>
      </div>
      <div class="s-mid">
        <div class="s-qtr" id="s-qtr">Pre-Match</div>
        <div class="s-clk" id="s-clk">00:00</div>
        <div class="s-sta" id="s-sta">Ready</div>
      </div>
      <div class="s-team" style="align-items:flex-end">
        <div class="s-lbl">Them</div>
        <div class="s-gaa" id="sc-th">0-00</div>
        <div class="s-pts" id="sc-th-p">(0)</div>
      </div>
    </div>

    <!-- QUARTER PILLS -->
    <div class="qrow">
      <div class="qpill active" id="qp1">Q1</div>
      <div class="qpill"        id="qp2">Q2</div>
      <div class="qpill"        id="qp3">Q3</div>
      <div class="qpill"        id="qp4">Q4</div>
    </div>

    <!-- TABS -->
    <div class="tabbar" id="tabbar"></div>

    <!-- LAST EVENT -->
    <div class="le-bar">
      <span class="le-dot" id="le-dot"></span>
      <span class="le-txt" id="le-txt">— no events yet —</span>
    </div>

    <!-- SWIPE VIEWPORT -->
    <div class="viewport" id="viewport">
      <div class="track" id="track"></div>
      <div class="dots"  id="dots"></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="tbtn" id="tb-flow"  onclick="handleFlow()"><span class="tic">▶</span><span class="tlb">Start</span></div>
      <div class="tbtn" id="tb-pause" onclick="handlePause()"><span class="tic">⏸</span><span class="tlb">Pause</span></div>
      <div class="tbtn" id="tb-undo"  onclick="handleUndo()"><span class="tic">↩</span><span class="tlb">Undo</span></div>
      <div class="tbtn" id="tb-stats" onclick="toast('📊 Stats — not wired in mock-up')"><span class="tic">📊</span><span class="tlb">Stats</span></div>
      <div class="tbtn" id="tb-csv"   onclick="toast('⬇ CSV — not wired in mock-up')"><span class="tic">⬇</span><span class="tlb">CSV</span></div>
    </div>

  </div>
  <div id="toast"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
var TABS = [
  { lbl:'Our Shots',   ic:'🟢', btns:[
    { kpi:'Point Play (Us)',  cls:'cg', name:'Point Play (Us)'  },
    { kpi:'Miss Play (Us)',   cls:'cy', name:'Miss Play (Us)'   },
    { kpi:'Point Free (Us)',  cls:'cg', name:'Point Free (Us)'  },
    { kpi:'Miss Free (Us)',   cls:'cy', name:'Miss Free (Us)'   },
    { kpi:'Goal (Us)',        cls:'cg', name:'Goal (Us)'        },
  ]},
  { lbl:'Their Shots', ic:'🔴', btns:[
    { kpi:'Point Play (Them)',  cls:'cr', name:'Point Play (Them)'  },
    { kpi:'Miss Play (Them)',   cls:'co', name:'Miss Play (Them)'   },
    { kpi:'Point Free (Them)',  cls:'cr', name:'Point Free (Them)'  },
    { kpi:'Miss Free (Them)',   cls:'co', name:'Miss Free (Them)'   },
    { kpi:'Goal (Them)',        cls:'cr', name:'Goal (Them)'        },
  ]},
  { lbl:'Puckouts',    ic:'🟣', btns:[
    { kpi:'Our PO Win',    cls:'cp', name:'Our PO Win'    },
    { kpi:'Our PO Lose',   cls:'cr', name:'Our PO Lose'   },
    { kpi:'Their PO Win',  cls:'cp', name:'Their PO Win'  },
    { kpi:'Their PO Lose', cls:'cr', name:'Their PO Lose' },
  ]},
  { lbl:'Possession',  ic:'🔵', btns:[
    { kpi:'Contested Win',  cls:'cb',  name:'Contested Win'  },
    { kpi:'Contested Loss', cls:'cgr', name:'Contested Loss' },
    { kpi:'T/O Forced',     cls:'cb',  name:'T/O Forced (Us)'},
    { kpi:'Unforced Loss',  cls:'cgr', name:'Unforced Loss'  },
    { kpi:'Free Win',       cls:'cp',  name:'Free Win'       },
    { kpi:'Free Lost',      cls:'cgr', name:'Free Lost'      },
    { kpi:'Run Thru 65',    cls:'cy',  name:'Run Thru 65'    },
    { kpi:'Card For Us',    cls:'cr',  name:'Card For Us'    },
  ]},
];

var ZONE_LBL = { Left:'◄ L', Centre:'● C', Right:'R ►' };
var ZONE_SYM = { Left:'◄',   Centre:'●',   Right:'►'   };

var KPI_COL = {
  'Point Play (Us)':'#00e676','Miss Play (Us)':'#ffe082',
  'Point Free (Us)':'#00e676','Miss Free (Us)':'#ffe082','Goal (Us)':'#00e676',
  'Point Play (Them)':'#ff3d5a','Miss Play (Them)':'#ffab40',
  'Point Free (Them)':'#ff3d5a','Miss Free (Them)':'#ffab40','Goal (Them)':'#ff3d5a',
  'Our PO Win':'#b388ff','Our PO Lose':'#ff3d5a',
  'Their PO Win':'#b388ff','Their PO Lose':'#ff3d5a',
  'T/O Forced':'#00d4ff','Contested Win':'#00d4ff','Contested Loss':'#8a9bb5',
  'Run Thru 65':'#ffe082','Unforced Loss':'#8a9bb5',
  'Free Win':'#b388ff','Free Lost':'#8a9bb5','Card For Us':'#ff3d5a',
};

var HOLD_MS   = 350;
var SWIPE_PX  = 32;
var SWIPE_ANG = 35;
var DEAD_PX   = 8;

// ── STATE ─────────────────────────────────────────────────────────────────
var counts   = {};
var eventLog = [];
var curTab   = 0;
var flow     = 'pre';   // pre|first_half|half_time|second_half|ended
var paused   = false;
var clkStart = null, clkOff = 0, clkIv = null;
var g        = null;    // active gesture

TABS.forEach(function(t){ t.btns.forEach(function(b){ counts[b.kpi] = 0; }); });

// ── BUILD UI ──────────────────────────────────────────────────────────────
function build() {
  var tabbar = document.getElementById('tabbar');
  var track  = document.getElementById('track');
  var dots   = document.getElementById('dots');
  tabbar.innerHTML = track.innerHTML = dots.innerHTML = '';

  TABS.forEach(function(tab, ti) {
    // tab button
    var t = document.createElement('div');
    t.className = 'tab' + (ti === 0 ? ' active' : '');
    t.innerHTML = '<span class="tab-ic">' + tab.ic + '</span><span class="tab-lb">' + tab.lbl + '</span>';
    t.setAttribute('data-ti', ti);
    t.onclick = function(){ goTab(parseInt(t.getAttribute('data-ti'))); };
    tabbar.appendChild(t);

    // page
    var page = document.createElement('div');
    page.className = 'page';

    tab.btns.forEach(function(b) {
      var btn = document.createElement('div');
      btn.className = 'ebtn ' + b.cls;
      btn.setAttribute('data-kpi', b.kpi);
      btn.innerHTML =
        '<div class="efill"></div>' +
        '<div class="ezbadge"></div>' +
        '<div class="einner">' +
          '<div class="ecount" id="ec-' + b.kpi.replace(/\W+/g,'_') + '">' + counts[b.kpi] + '</div>' +
          '<div class="ediv"></div>' +
          '<div class="einfo">' +
            '<div class="ename">' + b.name + '</div>' +
            '<div class="ehint">Hold to log</div>' +
          '</div>' +
        '</div>';
      page.appendChild(btn);
    });

    track.appendChild(page);

    // dot
    var d = document.createElement('div');
    d.className = 'dot' + (ti === 0 ? ' active' : '');
    dots.appendChild(d);
  });

  moveTo(0, false);
  setupGestures();
}

function moveTo(idx, animate) {
  var track = document.getElementById('track');
  track.style.transition = animate ? 'transform 0.25s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform  = 'translateX(' + (-idx * 100) + '%)';
  document.querySelectorAll('.dot').forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  document.querySelectorAll('.tab').forEach(function(t, i){ t.classList.toggle('active', i === idx); });
}

function goTab(idx) { curTab = idx; moveTo(idx, true); }

// ── GESTURE ENGINE ────────────────────────────────────────────────────────
function setupGestures() {
  var vp = document.getElementById('viewport');
  vp.addEventListener('touchstart',  tStart,  { passive: false });
  vp.addEventListener('touchmove',   tMove,   { passive: false });
  vp.addEventListener('touchend',    tEnd,    { passive: false });
  vp.addEventListener('touchcancel', tCancel, { passive: false });
  var md = false;
  vp.addEventListener('mousedown',  function(e){ md=true; gDown(e.clientX,e.clientY,e.target); });
  vp.addEventListener('mousemove',  function(e){ if(md) gMove(e.clientX,e.clientY); });
  vp.addEventListener('mouseup',    function(e){ if(md){ md=false; gUp(e.clientX); } });
  vp.addEventListener('mouseleave', function(){ if(md){ md=false; gCancel(); } });
}

function tStart(e){ e.preventDefault(); var t=e.changedTouches[0]; gDown(t.clientX,t.clientY,t.target); }
function tMove(e) { e.preventDefault(); var t=e.changedTouches[0]; gMove(t.clientX,t.clientY); }
function tEnd(e)  { e.preventDefault(); var t=e.changedTouches[0]; gUp(t.clientX); }
function tCancel(){ gCancel(); }

function getZone(btn, cx) {
  var r = btn.getBoundingClientRect();
  var rel = (cx - r.left) / r.width;
  return rel < 0.333 ? 'Left' : rel < 0.667 ? 'Centre' : 'Right';
}

function gDown(cx, cy, target) {
  var btn = target.closest ? target.closest('.ebtn') : null;
  g = {
    sx: cx, sy: cy,
    btn: btn,
    zone: btn ? getZone(btn, cx) : 'Centre',
    intent: 'pending',
    base: -curTab * 100,
    timer: null
  };
  if (btn) {
    var badge = btn.querySelector('.ezbadge');
    badge.textContent = ZONE_LBL[g.zone];
    g.timer = setTimeout(function() {
      if (!g || g.intent === 'swipe' || g.intent === 'cancelled') return;
      g.intent = 'button';
      btn.classList.add('pressing');
      if (navigator.vibrate) navigator.vibrate(12);
    }, HOLD_MS);
  }
}

function gMove(cx, cy) {
  if (!g) return;
  var dx = cx - g.sx;
  var dy = cy - g.sy;
  var dist = Math.sqrt(dx*dx + dy*dy);

  if (g.intent === 'pending' && dist > DEAD_PX) {
    var ang = Math.abs(Math.atan2(Math.abs(dy), Math.abs(dx)) * 180 / Math.PI);
    if (ang < SWIPE_ANG) {
      clearTimeout(g.timer);
      if (g.btn) {
        g.btn.classList.remove('pressing');
        g.btn.querySelector('.ezbadge').textContent = '';
      }
      g.intent = 'swipe';
    }
  }

  if (g.intent === 'swipe') {
    var vw   = document.getElementById('viewport').offsetWidth;
    var pct  = g.base + (dx / vw) * 100;
    var minP = -(TABS.length - 1) * 100;
    if (pct > 0)    pct = pct * 0.18;
    if (pct < minP) pct = minP + (pct - minP) * 0.18;
    var track = document.getElementById('track');
    track.style.transition = 'none';
    track.style.transform  = 'translateX(' + pct + '%)';
    return;
  }

  if (g.btn && (g.intent === 'button' || g.intent === 'pending')) {
    var r = g.btn.getBoundingClientRect();
    if (cx < r.left-20 || cx > r.right+20 || cy < r.top-20 || cy > r.bottom+20) {
      clearTimeout(g.timer);
      g.btn.classList.remove('pressing');
      g.btn.querySelector('.ezbadge').textContent = '';
      g.intent = 'cancelled';
    }
  }
}

function gUp(cx) {
  if (!g) return;
  clearTimeout(g.timer);

  if (g.intent === 'swipe') {
    var dx = cx - g.sx;
    var nt = curTab;
    if (dx < -SWIPE_PX && curTab < TABS.length-1) nt = curTab+1;
    if (dx >  SWIPE_PX && curTab > 0)             nt = curTab-1;
    if (nt !== curTab && navigator.vibrate) navigator.vibrate([6,20,6]);
    curTab = nt;
    moveTo(curTab, true);
    g = null;
    return;
  }

  if (g.intent === 'button' && g.btn) {
    var btn  = g.btn;
    var zone = g.zone;
    btn.classList.remove('pressing');
    btn.classList.add('fired');
    btn.querySelector('.ezbadge').textContent = ZONE_LBL[zone];
    setTimeout(function(){ btn.classList.remove('fired'); btn.querySelector('.ezbadge').textContent=''; }, 350);
    doFire(btn, zone);
    g = null;
    return;
  }

  // pending or cancelled — clean up
  if (g.btn) {
    g.btn.classList.remove('pressing');
    g.btn.querySelector('.ezbadge').textContent = '';
  }
  g = null;
}

function gCancel() {
  if (!g) return;
  clearTimeout(g.timer);
  if (g.btn) { g.btn.classList.remove('pressing'); g.btn.querySelector('.ezbadge').textContent=''; }
  if (g.intent === 'swipe') moveTo(curTab, true);
  g = null;
}

// ── FIRE EVENT ────────────────────────────────────────────────────────────
function doFire(btn, zone) {
  if (flow === 'pre')       { startGame(); }
  if (paused)               { toast('Paused — tap ▶ Resume first'); return; }
  if (flow === 'half_time') { toast('Half Time — tap ▶ 2nd Half'); return; }
  if (flow === 'ended')     { toast('Full Time'); return; }

  var kpi = btn.getAttribute('data-kpi');
  counts[kpi]++;
  eventLog.push({ kpi:kpi, zone:zone, quarter:getQ(), time:document.getElementById('s-clk').textContent });

  if (navigator.vibrate) navigator.vibrate(22);

  var el = document.getElementById('ec-' + kpi.replace(/\W+/g,'_'));
  if (el) {
    el.textContent = counts[kpi];
    el.style.transform = 'scale(1.4)';
    setTimeout(function(){ el.style.transform=''; }, 200);
  }

  updateScore();

  var col = KPI_COL[kpi] || '#6b7a99';
  var dot = document.getElementById('le-dot');
  dot.style.display    = 'inline-block';
  dot.style.background = col;
  document.getElementById('le-txt').textContent = kpi + ' · ' + ZONE_SYM[zone];

  toast('✓ ' + kpi + ' · ' + ZONE_LBL[zone]);
}

// ── SCOREBOARD ────────────────────────────────────────────────────────────
function updateScore() {
  var gU = counts['Goal (Us)']||0;
  var pU = (counts['Point Play (Us)']||0) + (counts['Point Free (Us)']||0);
  var gT = counts['Goal (Them)']||0;
  var pT = (counts['Point Play (Them)']||0) + (counts['Point Free (Them)']||0);
  document.getElementById('sc-us').textContent   = gU+'-'+pad(pU);
  document.getElementById('sc-us-p').textContent = '('+( gU*3+pU )+')';
  document.getElementById('sc-th').textContent   = gT+'-'+pad(pT);
  document.getElementById('sc-th-p').textContent = '('+( gT*3+pT )+')';
}
function pad(n){ return n.toString().padStart(2,'0'); }

// ── CLOCK & FLOW ──────────────────────────────────────────────────────────
function getSecs() {
  if (!clkStart) return 0;
  return Math.floor((clkOff + (paused ? 0 : Date.now()-clkStart)) / 1000);
}
function getQ() {
  var s = getSecs();
  if (flow==='first_half'||flow==='half_time') return s < 900 ? 1 : 2;
  return s < 900 ? 3 : 4;
}

function startGame() {
  flow='first_half'; clkStart=Date.now(); clkOff=0; paused=false;
  setFB('⏸','Half','rgba(255,171,64,0.12)','rgba(255,171,64,0.5)','var(--amber)');
  clkIv = setInterval(tick, 500);
  toast('🏁 Kick-off — 1st Half');
}

function tick() {
  if (paused) return;
  var base = flow==='second_half' ? 1800+getSecs() : getSecs();
  document.getElementById('s-clk').textContent = fmtTime(base);
  var s=getSecs(), q;
  if      (flow==='first_half')  { q=s<900?1:2; document.getElementById('s-qtr').textContent='Quarter '+q; }
  else if (flow==='half_time')   { q=2; document.getElementById('s-qtr').textContent='Half Time'; }
  else if (flow==='second_half') { q=s<900?3:4; document.getElementById('s-qtr').textContent='Quarter '+q; }
  else                           { q=4; document.getElementById('s-qtr').textContent='Full Time'; }
  document.getElementById('s-sta').textContent = paused?'Paused':'Live';
  for(var i=1;i<=4;i++){
    document.getElementById('qp'+i).classList.toggle('active',i===q);
    document.getElementById('qp'+i).classList.toggle('done',  i<q);
  }
}
function fmtTime(s){ return pad(Math.floor(s/60))+':'+pad(s%60); }

function handleFlow() {
  if (flow==='pre') { startGame(); return; }
  if (flow==='first_half') {
    clkOff+=Date.now()-clkStart; clkStart=null; flow='half_time';
    setFB('▶','2nd Half','rgba(0,212,255,0.12)','rgba(0,212,255,0.5)','var(--accent)');
    document.getElementById('s-qtr').textContent=document.getElementById('s-sta').textContent='Half Time';
    toast('⏸ Half Time'); return;
  }
  if (flow==='half_time') {
    flow='second_half'; clkStart=Date.now(); clkOff=0; paused=false;
    setFB('⏹','End','rgba(255,61,90,0.12)','rgba(255,61,90,0.5)','var(--red)');
    toast('▶ 2nd Half'); return;
  }
  if (flow==='second_half') {
    flow='ended'; clearInterval(clkIv);
    setFB('—','FT','rgba(107,122,153,0.08)','rgba(107,122,153,0.3)','var(--text-dim)');
    document.getElementById('s-sta').textContent='Full Time';
    toast('⏹ Full Time'); return;
  }
}

function handlePause() {
  if (flow!=='first_half'&&flow!=='second_half'){ toast('Only during active play'); return; }
  if (paused) {
    clkStart=Date.now(); paused=false;
    document.getElementById('tb-pause').innerHTML='<span class="tic">⏸</span><span class="tlb">Pause</span>';
    toast('▶ Resumed');
  } else {
    clkOff+=Date.now()-clkStart; clkStart=null; paused=true;
    document.getElementById('tb-pause').innerHTML='<span class="tic">▶</span><span class="tlb">Resume</span>';
    toast('⏸ Paused');
  }
}

function handleUndo() {
  if (!eventLog.length){ toast('Nothing to undo'); return; }
  var last = eventLog.pop();
  counts[last.kpi] = Math.max(0,(counts[last.kpi]||1)-1);
  var el = document.getElementById('ec-'+last.kpi.replace(/\W+/g,'_'));
  if (el) el.textContent = counts[last.kpi];
  updateScore();
  toast('↩ Undid: '+last.kpi+' ['+last.zone+']');
}

function setFB(ic,lb,bg,bc,c){
  var b=document.getElementById('tb-flow');
  b.innerHTML='<span class="tic">'+ic+'</span><span class="tlb">'+lb+'</span>';
  b.style.background=bg; b.style.borderColor=bc; b.style.color=c;
}

// ── TOAST ─────────────────────────────────────────────────────────────────
var toastTmr;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){ el.classList.remove('show'); },2200);
}

build();
</script>
</body>
