<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests;">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-store">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Camino Training</title>
<style>
:root{
  --green:#1a7a4a;--green-bg:#e8f5ee;--green-text:#0d4a2a;
  --red:#c0392b;--red-bg:#fdecea;--red-text:#7b1a14;
  --blue:#1a5fa8;--blue-bg:#e6f0fb;--blue-text:#0c3d73;
  --teal:#0e6e56;--teal-bg:#e1f5ee;--teal-text:#084030;
  --purple:#4a3ab0;--purple-bg:#eeedfe;--purple-text:#2a1f70;
  --amber:#7a4500;--amber-bg:#fef3e0;--amber-text:#4a2800;
  --border:#e0ddd6;--bg:#f7f5f0;--card:#fff;--text:#1a1a1a;--muted:#6b6b6b;
  --r:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --green:#34c97a;--green-bg:#0d3320;--green-text:#7de8aa;
    --red:#e05c4a;--red-bg:#3a1008;--red-text:#f5a090;
    --blue:#4da3f5;--blue-bg:#0a2240;--blue-text:#9cd0ff;
    --teal:#2ecba0;--teal-bg:#063324;--teal-text:#80e8c8;
    --purple:#9b8ef5;--purple-bg:#1a1440;--purple-text:#ccc5ff;
    --amber:#f5a940;--amber-bg:#2a1800;--amber-text:#ffd090;
    --border:#2e2c28;--bg:#161512;--card:#1e1c18;--text:#f0ede6;--muted:#8a8880;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);font-size:16px;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.hdr{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  padding-top:calc(env(safe-area-inset-top) + 12px);
  position:sticky;top:0;z-index:200;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-0.4px;}
.hdr-sub{font-size:13px;color:var(--muted);margin-top:1px;}
.hdr-pct{font-size:22px;font-weight:700;color:var(--green);}
.bar-wrap{margin-top:9px;background:var(--border);border-radius:20px;height:6px;overflow:hidden;}
.bar{height:100%;background:var(--green);border-radius:20px;transition:width .4s;}
.bar-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
.tabs{display:flex;gap:7px;padding:11px 16px 10px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 15px;border-radius:20px;font-size:14px;font-weight:500;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;-webkit-user-select:none;user-select:none;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.content{padding-bottom:40px;}
.cdown{margin:14px 16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.cdown-num{font-size:36px;font-weight:800;color:var(--green);letter-spacing:-1px;line-height:1;}
.cdown-lbl{font-size:12px;color:var(--muted);margin-top:3px;}
.cdown-r{text-align:right;}
.cdown-r .cr1{font-size:13px;font-weight:600;margin-bottom:3px;}
.cdown-r .cr2{font-size:12px;color:var(--muted);}
.wsec{padding:0 16px 6px;}
.wlbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:16px 0 8px;}
.dcard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.dcard.today{border-color:var(--blue);border-width:2px;}
.dhead{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;}
.dname{font-size:15px;font-weight:600;}
.dpast{font-size:11px;color:var(--muted);}
.today-badge{font-size:11px;font-weight:700;background:var(--blue-bg);color:var(--blue-text);padding:3px 9px;border-radius:10px;}
.srow{display:flex;align-items:center;padding:10px 14px;border-top:1px solid var(--border);gap:10px;min-height:64px;}
.sinfo{flex:1;min-width:0;}
.sslot{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.pill{display:inline-block;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:4px;}
.pill-t{background:var(--blue-bg);color:var(--blue-text);}
.pill-p{background:var(--teal-bg);color:var(--teal-text);}
.pill-h{background:var(--amber-bg);color:var(--amber-text);}
.pill-w{background:var(--purple-bg);color:var(--purple-text);}
.pill-r{background:var(--border);color:var(--muted);}
.sdesc{font-size:13px;color:var(--muted);line-height:1.45;}
.btngrp{display:flex;gap:8px;flex-shrink:0;}
.btn{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transition:transform .12s;-webkit-user-select:none;user-select:none;color:var(--muted);}
.btn:active{transform:scale(0.88);}
.btn.done{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.btn.skip{background:var(--red-bg);border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

  <div class="hdr-top">
    <div>
      <h1>Camino Training</h1>
      <div class="hdr-sub">Lisbon to Santiago de Compostela</div>
    </div>
    <div class="hdr-pct" id="pct">0%</div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
  <div class="bar-lbl" id="barlbl"></div>
</header>
<div class="content" id="app"></div>

  {d:'2026-04-20',sl:'Evening',   t:'t',lb:'Treadmill 30 min',   ds:'6 km/h, incline 11.'},
  {d:'2026-04-21',sl:'Evening',   t:'p',lb:'Pilates 30 min',     ds:'Core stability.'},
  {d:'2026-04-22',sl:'Lunchtime', t:'t',lb:'Treadmill 30 min',   ds:'6 km/h, incline 11.'},

];

var WNOTES={
  '2026-03-09':'Special opening - 2 hikes while Monday is free',
  '2026-03-16':'Recovery week - one moderate hike',
  '2026-03-23':'Build - first long Camino simulation hike',
  '2026-03-30':'Peak - longest hike of the programme',
  '2026-04-06':'Build continued',
  '2026-04-13':'Final hard week before taper',
  '2026-04-20':'Taper - fitness banked, arrive fresh'
};

// ── STORAGE ──────────────────────────────────────────────────────────────────
function sGet(i){
  try{
    var raw=localStorage.getItem(NS+i);
    if(raw===null)return'';
    if(raw.length>MAX_VAL)return'';
    return VSTATUS[raw]?raw:'';
  }catch(e){return'';}
}
function sSet(i,v){
  if(!VSTATUS[v])return;
  try{localStorage.setItem(NS+i,v);}catch(e){}
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function parseDate(str){
  if(!str||!/^\d{4}-\d{2}-\d{2}$/.test(str))return null;
  var p=str.split('-');
  var y=parseInt(p[0],10),m=parseInt(p[1],10),d=parseInt(p[2],10);
  if(m<1||m>12||d<1||d>31)return null;
  return new Date(y,m-1,d);
}
function todayStr(){
  var n=new Date();
  return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
}
function pad(n){return n<10?'0'+n:String(n);}
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(str){
  var d=parseDate(str);
  if(!d)return str;
  return DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];
}
function mondayOf(str){
  var d=parseDate(str);
  if(!d)return str;
  var day=d.getDay();
  var diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function daysUntil(str){
  var now=new Date();now.setHours(0,0,0,0);
  var t=parseDate(str);
  if(!t)return 0;
  return Math.max(0,Math.round((t-now)/86400000));
}

// ── DOM HELPER ───────────────────────────────────────────────────────────────
// Simple, Safari-safe: create element, set class, set textContent if provided
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined&&txt!==null)e.textContent=String(txt);
  return e;
}
function ap(parent){
  for(var i=1;i<arguments.length;i++){
    if(arguments[i])parent.appendChild(arguments[i]);
  }
  return parent;
}

// ── PILL ─────────────────────────────────────────────────────────────────────
function pillCls(t){return'pill '+(VTYPES[t]?'pill-'+t:'pill-r');}

// ── SESSION ROW ──────────────────────────────────────────────────────────────
function buildRow(s,idx){
  var st=sGet(idx);
  var row=mk('div','srow');row.id='sr'+idx;
  var info=mk('div','sinfo');
  ap(info,
    mk('div','sslot',s.sl),
    ap(mk('div'),mk('span',pillCls(s.t),s.lb)),
    mk('div','sdesc',s.ds)
  );
  var grp=mk('div','btngrp');
  var bd=mk('button','btn'+(st==='done'?' done':''),'\u2713');
  bd.type='button';bd.setAttribute('aria-label','Mark done');
  var bs=mk('button','btn'+(st==='skip'?' skip':''),'\u2717');
  bs.type='button';bs.setAttribute('aria-label','Mark skipped');
  // Capture idx in closure safely
  (function(ii,dd){
    bd.addEventListener('click',function(){tog(dd,ii,'done');},{passive:true});
    bs.addEventListener('click',function(){tog(dd,ii,'skip');},{passive:true});
  }(idx,s.d));
  ap(grp,bd,bs);
  ap(row,info,grp);
  return row;
}

// ── DAY CARD ─────────────────────────────────────────────────────────────────
function buildCard(date,list){
  var td=todayStr();
  var isToday=(date===td);
  var isPast=(date<td);
  var allDone=list.length>0&&list.every(function(s){return sGet(s.i)==='done';});
  var card=mk('div','dcard'+(isToday?' today':''));
  card.id='dc'+date;
  var head=mk('div','dhead');
  var left=mk('div');
  var dname=mk('div','dname',fmtDate(date)+(allDone?' \u2713':''));
  dname.id='dn'+date;
  ap(left,dname);
  if(isPast&&!isToday)ap(left,mk('div','dpast','Past'));
  ap(head,left);
  if(isToday)ap(head,mk('span','today-badge','TODAY'));
  ap(card,head);
  for(var i=0;i<list.length;i++)ap(card,buildRow(list[i],list[i].i));
  return card;
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────────
function buildCountdown(){
  var dep=daysUntil('2026-04-30');
  var walk=daysUntil('2026-05-02');
  var wrap=mk('div','cdown');wrap.id='cdown';
  var left=mk('div');
  ap(left,mk('div','cdown-num',String(dep)),mk('div','cdown-lbl','days to departure'));
  var right=mk('div','cdown-r');
  ap(right,mk('div','cr1','Depart Thu 30 Apr'),mk('div','cr1','Walk starts Sat 2 May'),mk('div','cr2',walk+' days to first step'));
  ap(wrap,left,right);
  return wrap;
}

// ── GROUP ────────────────────────────────────────────────────────────────────
function byDate(){
  var m={};
  for(var i=0;i<S.length;i++){
    var s=S[i];
    if(!m[s.d])m[s.d]=[];
    m[s.d].push({d:s.d,sl:s.sl,t:s.t,lb:s.lb,ds:s.ds,i:i});
  }
  return m;
}
function byWeek(dm){
  var weeks={},order=[];
  var dates=Object.keys(dm).sort();
  for(var i=0;i<dates.length;i++){
    var ws=mondayOf(dates[i]);
    if(!weeks[ws]){weeks[ws]=[];order.push(ws);}
    weeks[ws].push(dates[i]);
  }
  return{weeks:weeks,order:order};
}

// ── PROGRESS ─────────────────────────────────────────────────────────────────
function updateProgress(){
  var total=S.length,done=0,skip=0;
  for(var i=0;i<S.length;i++){
    var v=sGet(i);
    if(v==='done')done++;
    else if(v==='skip')skip++;
  }
  var pct=Math.round(done/total*100);
  var bar=document.getElementById('bar');
  var pctEl=document.getElementById('pct');
  var lbl=document.getElementById('barlbl');
  if(bar)bar.style.width=pct+'%';
  if(pctEl)pctEl.textContent=pct+'%';
  if(lbl)lbl.textContent=done+' of '+total+' completed - '+skip+' skipped';
}

// ── TOGGLE ───────────────────────────────────────────────────────────────────
function tog(date,idx,val){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date))return;
  var i=parseInt(idx,10);
  if(isNaN(i)||i<0||i>=S.length)return;
  if(S[i].d!==date)return;
  var cur=sGet(i);
  sSet(i,cur===val?'':val);
  var old=document.getElementById('sr'+i);
  if(old){var nr=buildRow(S[i],i);old.parentNode.replaceChild(nr,old);}
  var dm=byDate();
  var list=dm[date]||[];
  var allDone=list.length>0&&list.every(function(s){return sGet(s.i)==='done';});
  var dn=document.getElementById('dn'+date);
  if(dn)dn.textContent=fmtDate(date)+(allDone?' \u2713':'');
  updateProgress();
}

// ── TAB ACTIONS ──────────────────────────────────────────────────────────────
function showAll(){
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  var t=document.getElementById('tab-all');if(t)t.classList.add('active');
  var secs=document.querySelectorAll('.wsec');
  for(var j=0;j<secs.length;j++)secs[j].style.display='block';
  var cc=document.getElementById('cdown');if(cc)cc.style.display='flex';
}
function showWeek(ws,scroll){
  var found=false;
  for(var k=0;k<VWEEKS.length;k++){if(VWEEKS[k]===ws){found=true;break;}}
  if(!found)return;
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  var tab=document.getElementById('tab-'+ws);if(tab)tab.classList.add('active');
  var cc=document.getElementById('cdown');if(cc)cc.style.display='none';
  var secs=document.querySelectorAll('.wsec');
  for(var j=0;j<secs.length;j++){
    secs[j].style.display=(secs[j].getAttribute('data-ws')===ws)?'block':'none';
  }
  if(scroll!==false){
    var sec=document.querySelector('[data-ws="'+ws+'"]');
    if(sec)window.scrollTo({top:sec.offsetTop-120,behavior:'smooth'});
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  var dm=byDate();
  var grp=byWeek(dm);
  var weeks=grp.weeks,order=grp.order;
  var td=todayStr();
  var todayWeek=mondayOf(td);
  var app=document.getElementById('app');
  if(!app)return;
  while(app.firstChild)app.removeChild(app.firstChild);

  // Tabs
  var tabsEl=mk('div','tabs');
  var allTab=mk('button','tab active','All');
  allTab.type='button';allTab.id='tab-all';
  allTab.addEventListener('click',showAll,{passive:true});
  ap(tabsEl,allTab);
  for(var ti=0;ti<order.length;ti++){
    var ws=order[ti];
    var isNow=(ws===todayWeek);
    var t=mk('button','tab'+(isNow?' active':''),'Wk '+(ti+1));
    t.type='button';t.id='tab-'+ws;
    (function(w){
      t.addEventListener('click',function(){showWeek(w);},{passive:true});
    }(ws));
    ap(tabsEl,t);
  }
  ap(app,tabsEl);

  var main=mk('div');main.id='main';
  ap(main,buildCountdown());

  for(var wi=0;wi<order.length;wi++){
    var ws=order[wi];
    var dates=weeks[ws].slice().sort();
    var wd=parseDate(ws);
    var wlblStr='Week '+(wi+1)+(wd?' - '+wd.getDate()+' '+MONTHS[wd.getMonth()]:'');
    var note=WNOTES[ws]||'';
    if(note)wlblStr+=': '+note;
    var sec=mk('div','wsec');
    sec.setAttribute('data-ws',ws);
    ap(sec,mk('div','wlbl',wlblStr));
    for(var di=0;di<dates.length;di++){
      ap(sec,buildCard(dates[di],dm[dates[di]]));
    }
    ap(main,sec);
  }
  ap(app,main);
  updateProgress();

  setTimeout(function(){
    var todayCard=document.getElementById('dc'+td);
    if(todayCard)todayCard.scrollIntoView({behavior:'smooth',block:'center'});
    showWeek(todayWeek,false);
  },100);
}

render();
}());
</script>
