<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>GAA Stats – iPhone 16</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235;
    --border:#1e2d45; --text:#e8eef8; --text-dim:#6b7a99;
    --accent:#00d4ff; --green:#00e676; --red:#ff3d5a;
    --amber:#ffab40; --purple:#b388ff;
    --r:14px; --rs:10px;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    background:#1a1a2e;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Inter',sans-serif;
  }

  .phone-shell {
    width:393px; height:852px;
    background:#0a0e1a;
    border-radius:54px;
    border:8px solid #2a2a3a;
    box-shadow:0 0 0 1px #444, 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #111;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .dynamic-island {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:120px; height:34px; background:#000; border-radius:20px; z-index:100;
  }

  .app { display:flex; flex-direction:column; height:100%; padding-top:58px; }

  /* SCOREBOARD */
  .scoreboard {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:6px 16px 5px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .score-team { display:flex; flex-direction:column; align-items:center; }
  .score-lbl  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
  .score-gaa  { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; color:var(--text); letter-spacing:1px; }
  .score-pts  { font-size:10px; color:var(--text-dim); font-weight:700; margin-top:1px; }
  .match-centre { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .qtr-badge  { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); }
  .clock      { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text); line-height:1; letter-spacing:1px; }
  .match-status { font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }

  /* QUARTER PILLS */
  .qtr-row {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:4px; padding:5px 10px;
    background:var(--bg); flex-shrink:0;
  }
  .qtr-pill {
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:8px; padding:4px 2px;
    text-align:center; font-size:10px; font-weight:700;
    letter-spacing:1px; color:var(--text-dim); text-transform:uppercase;
  }
  .qtr-pill.active { background:var(--accent); border-color:var(--accent); color:#000; }
  .qtr-pill.done   { border-color:rgba(0,212,255,0.3); color:rgba(0,212,255,0.5); }
  .qtr-sub { font-size:9px; font-weight:700; display:block; margin-top:1px; }

  /* CATEGORY TABS */
  .tab-bar {
    display:grid; grid-template-columns:repeat(4,1fr);
    background:var(--surface); border-bottom:2px solid var(--border);
    flex-shrink:0;
  }
  .tab {
    padding:10px 4px 9px; text-align:center; cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-2px;
    transition:border-color 0.2s;
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .tab-icon { font-size:16px; line-height:1; }
  .tab-lbl  { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-dim); transition:color 0.2s; }
  .tab.active .tab-lbl  { color:var(--accent); }
  .tab.active { border-bottom-color:var(--accent); }

  /* SWIPE VIEWPORT */
  .swipe-viewport {
    flex:1; overflow:hidden; position:relative;
  }
  .swipe-track {
    display:flex; height:100%;
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    will-change:transform;
  }
  .swipe-page {
    flex:0 0 100%; height:100%;
    overflow-y:auto; overflow-x:hidden;
    padding:8px 10px;
    display:flex; flex-direction:column; gap:7px;
  }

  /* LAST EVENT TICKER */
  .last-event {
    text-align:center; font-size:10px; font-weight:700; color:var(--text-dim);
    padding:2px 10px 0; height:16px; flex-shrink:0;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .le-dot { width:7px; height:7px; border-radius:50%; background:var(--green); }

  /* EVENT BUTTONS */
  .evt-btn {
    position:relative; border-radius:var(--r); border:1.5px solid;
    padding:0; height:72px;
    display:flex; align-items:center;
    overflow:hidden; cursor:pointer;
    touch-action:none; flex-shrink:0;
    transition:transform 0.1s;
    user-select:none; -webkit-user-select:none;
  }

  .zone-thirds {
    position:absolute; inset:0; display:flex;
    pointer-events:none; z-index:1;
  }
  .z3 { flex:1; opacity:0; transition:opacity 0.08s; }
  .z3.zl { border-radius:12px 0 0 12px; }
  .z3.zr { border-radius:0 12px 12px 0; }
  .z3.active { opacity:1; }

  .btn-content {
    position:relative; z-index:2;
    display:flex; align-items:center;
    width:100%; padding:0 14px; pointer-events:none;
  }
  .btn-count {
    font-family:'Bebas Neue',sans-serif; font-size:42px;
    line-height:1; width:48px; text-align:center; flex-shrink:0;
  }
  .btn-divider {
    width:1px; height:38px; background:rgba(255,255,255,0.08);
    margin:0 14px; flex-shrink:0;
  }
  .btn-info { flex:1; }
  .btn-name {
    font-size:15px; font-weight:800; letter-spacing:0.2px;
    color:var(--text); line-height:1.2; text-transform:uppercase;
  }
  .btn-zone-row { display:flex; gap:6px; margin-top:5px; }
  .zone-lbl {
    font-size:9px; font-weight:900; letter-spacing:1px;
    text-transform:uppercase; opacity:0.25;
    transition:opacity 0.08s; padding:2px 5px; border-radius:4px;
  }
  .zone-lbl.active { opacity:1; }

  /* Colour themes */
  .cat-green  { background:linear-gradient(145deg,#0d2010,#0a1a0d); border-color:#1a4020; }
  .cat-green  .btn-count,.cat-green  .zone-lbl { color:#00e676; }
  .cat-green  .z3 { background:rgba(0,230,118,0.18); }
  .cat-yellow { background:linear-gradient(145deg,#1a1500,#131000); border-color:#3a3000; }
  .cat-yellow .btn-count,.cat-yellow .zone-lbl { color:#ffe082; }
  .cat-yellow .z3 { background:rgba(255,224,130,0.18); }
  .cat-red    { background:linear-gradient(145deg,#200d0d,#1a0a0a); border-color:#401a1a; }
  .cat-red    .btn-count,.cat-red    .zone-lbl { color:#ff3d5a; }
  .cat-red    .z3 { background:rgba(255,61,90,0.18); }
  .cat-orange { background:linear-gradient(145deg,#1a0f00,#140b00); border-color:#3a2000; }
  .cat-orange .btn-count,.cat-orange .zone-lbl { color:#ffab40; }
  .cat-orange .z3 { background:rgba(255,171,64,0.18); }
  .cat-purple { background:linear-gradient(145deg,#150d20,#100a1a); border-color:#301a40; }
  .cat-purple .btn-count,.cat-purple .zone-lbl { color:#b388ff; }
  .cat-purple .z3 { background:rgba(179,136,255,0.18); }
  .cat-blue   { background:linear-gradient(145deg,#0d1520,#0a1018); border-color:#1a2a40; }
  .cat-blue   .btn-count,.cat-blue   .zone-lbl { color:#00d4ff; }
  .cat-blue   .z3 { background:rgba(0,212,255,0.18); }
  .cat-grey   { background:linear-gradient(145deg,#141820,#0f1218); border-color:#252e40; }
  .cat-grey   .btn-count,.cat-grey   .zone-lbl { color:#8a9bb5; }
  .cat-grey   .z3 { background:rgba(138,155,181,0.18); }

  /* BOTTOM TOOLBAR */
  .toolbar {
    display:grid; grid-template-columns:repeat(5,1fr);
    gap:5px; padding:6px 10px 28px;
    background:var(--surface); border-top:1px solid var(--border);
    flex-shrink:0;
  }
  .tool-btn {
    padding:9px 4px 8px; border-radius:10px; border:1.5px solid;
    font-size:10px; font-weight:700; letter-spacing:0.5px;
    text-transform:uppercase; text-align:center; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    line-height:1; transition:opacity 0.15s;
  }
  .tool-btn:active { opacity:0.65; }
  .tool-icon { font-size:14px; }
  .tool-lbl  { font-size:8px; font-weight:800; letter-spacing:0.5px; }
  #t-flow  { background:rgba(0,230,118,0.12);  border-color:rgba(0,230,118,0.45);  color:var(--green); }
  #t-pause { background:rgba(255,171,64,0.12); border-color:rgba(255,171,64,0.4);  color:var(--amber); }
  #t-undo  { background:rgba(255,61,90,0.12);  border-color:rgba(255,61,90,0.4);   color:var(--red); }
  #t-stats { background:rgba(0,212,255,0.12);  border-color:rgba(0,212,255,0.4);   color:var(--accent); }
  #t-csv   { background:rgba(179,136,255,0.12);border-color:rgba(179,136,255,0.4); color:var(--purple); }

  /* SWIPE HINT OVERLAY */
  .swipe-hint {
    position:absolute; bottom:12px; left:0; right:0;
    display:flex; justify-content:center; gap:6px;
    pointer-events:none; z-index:10;
  }
  .hint-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.15); transition:background 0.2s, transform 0.2s;
  }
  .hint-dot.active { background:var(--accent); transform:scale(1.3); }

  /* TOAST */
  #toast {
    position:absolute; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:6px 16px;
    font-size:12px; font-weight:600; color:var(--text-dim);
    opacity:0; transition:all 0.2s; white-space:nowrap;
    z-index:50; pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* INTENT DEBUG BADGE (remove in production) */
  #intent-badge {
    position:absolute; top:62px; right:12px;
    background:rgba(0,0,0,0.7); border:1px solid var(--border);
    border-radius:8px; padding:3px 8px;
    font-size:9px; font-weight:700; letter-spacing:1px;
    color:var(--text-dim); z-index:200; pointer-events:none;
    opacity:0; transition:opacity 0.2s;
  }
  #intent-badge.show { opacity:1; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="dynamic-island"></div>
  <div id="intent-badge">—</div>

  <div class="app">

    <!-- SCOREBOARD -->
    <div class="scoreboard">
      <div class="score-team">
        <div class="score-lbl">Us</div>
        <div class="score-gaa" id="score-us">0-00</div>
        <div class="score-pts" id="score-us-pts">(0)</div>
      </div>
      <div class="match-centre">
        <div class="qtr-badge"    id="qtr-label">Pre-Match</div>
        <div class="clock"        id="clock">00:00</div>
        <div class="match-status" id="match-status">Ready</div>
      </div>
      <div class="score-team" style="align-items:flex-end">
        <div class="score-lbl">Them</div>
        <div class="score-gaa" id="score-them">0-00</div>
        <div class="score-pts" id="score-them-pts">(0)</div>
      </div>
    </div>

    <!-- QUARTER PILLS -->
    <div class="qtr-row">
      <div class="qtr-pill active" id="q1">Q1<span class="qtr-sub" id="q1s"></span></div>
      <div class="qtr-pill"        id="q2">Q2<span class="qtr-sub" id="q2s"></span></div>
      <div class="qtr-pill"        id="q3">Q3<span class="qtr-sub" id="q3s"></span></div>
      <div class="qtr-pill"        id="q4">Q4<span class="qtr-sub" id="q4s"></span></div>
    </div>

    <!-- CATEGORY TABS -->
    <div class="tab-bar" id="tab-bar">
      <div class="tab active" data-tab="0" onclick="goToTab(0)">
        <span class="tab-icon">🟢</span><span class="tab-lbl">Our Shots</span>
      </div>
      <div class="tab" data-tab="1" onclick="goToTab(1)">
        <span class="tab-icon">🔴</span><span class="tab-lbl">Their Shots</span>
      </div>
      <div class="tab" data-tab="2" onclick="goToTab(2)">
        <span class="tab-icon">🟣</span><span class="tab-lbl">Puckouts</span>
      </div>
      <div class="tab" data-tab="3" onclick="goToTab(3)">
        <span class="tab-icon">🔵</span><span class="tab-lbl">Possession</span>
      </div>
    </div>

    <!-- LAST EVENT -->
    <div class="last-event" id="last-event">
      <span class="le-dot" id="le-dot" style="display:none"></span>
      <span id="le-text">— no events yet —</span>
    </div>

    <!-- SWIPE VIEWPORT -->
    <div class="swipe-viewport" id="swipe-viewport">
      <div class="swipe-track" id="swipe-track">
        <!-- Pages injected by JS -->
      </div>
      <!-- Page indicator dots -->
      <div class="swipe-hint" id="swipe-hint"></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="tool-btn" id="t-flow"  onclick="handleFlow()">
        <span class="tool-icon">▶</span><span class="tool-lbl">Start</span>
      </div>
      <div class="tool-btn" id="t-pause" onclick="handlePause()">
        <span class="tool-icon">⏸</span><span class="tool-lbl">Pause</span>
      </div>
      <div class="tool-btn" id="t-undo"  onclick="handleUndo()">
        <span class="tool-icon">↩</span><span class="tool-lbl">Undo</span>
      </div>
      <div class="tool-btn" id="t-stats" onclick="showToast('📊 Stats — not wired in mock-up')">
        <span class="tool-icon">📊</span><span class="tool-lbl">Stats</span>
      </div>
      <div class="tool-btn" id="t-csv"   onclick="showToast('⬇ CSV — not wired in mock-up')">
        <span class="tool-icon">⬇</span><span class="tool-lbl">CSV</span>
      </div>
    </div>

  </div>
  <div id="toast"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SWIPE_THRESHOLD   = 38;  // px horizontal to commit to tab swipe
const ANGLE_LOCK        = 28;  // degrees — below this from horizontal = swipe intent
const DEAD_ZONE         = 14;  // px — no decision made within this radius
const ZONE_SPLIT_L      = 0.333;
const ZONE_SPLIT_R      = 0.667;

const TABS_DATA = [
  { label:'Our Shots',   icon:'🟢', btns:[
    { kpi:'Point – Play (Us)',  cat:'cat-green',  name:'Point\nPlay (Us)'  },
    { kpi:'Miss – Play (Us)',   cat:'cat-yellow', name:'Miss\nPlay (Us)'   },
    { kpi:'Point – Free (Us)',  cat:'cat-green',  name:'Point\nFree (Us)'  },
    { kpi:'Miss – Free (Us)',   cat:'cat-yellow', name:'Miss\nFree (Us)'   },
    { kpi:'Goal – Us',          cat:'cat-green',  name:'Goal (Us)'         },
  ]},
  { label:'Their Shots', icon:'🔴', btns:[
    { kpi:'Point – Play (Them)',  cat:'cat-red',    name:'Point\nPlay (Them)'  },
    { kpi:'Miss – Play (Them)',   cat:'cat-orange', name:'Miss\nPlay (Them)'   },
    { kpi:'Point – Free (Them)',  cat:'cat-red',    name:'Point\nFree (Them)'  },
    { kpi:'Miss – Free (Them)',   cat:'cat-orange', name:'Miss\nFree (Them)'   },
    { kpi:'Goal – Them',          cat:'cat-red',    name:'Goal (Them)'         },
  ]},
  { label:'Puckouts',    icon:'🟣', btns:[
    { kpi:'Our PO – We Win',    cat:'cat-purple', name:'Our PO\nWe Win'    },
    { kpi:'Our PO – We Lose',   cat:'cat-red',    name:'Our PO\nWe Lose'   },
    { kpi:'Their PO – We Win',  cat:'cat-purple', name:'Their PO\nWe Win'  },
    { kpi:'Their PO – We Lose', cat:'cat-red',    name:'Their PO\nWe Lose' },
  ]},
  { label:'Possession',  icon:'🔵', btns:[
    { kpi:'Contested Win',   cat:'cat-blue',   name:'Contested\nWin'   },
    { kpi:'Contested Loss',  cat:'cat-grey',   name:'Contested\nLoss'  },
    { kpi:'T/O Forced (Us)', cat:'cat-blue',   name:'T/O Forced\n(Us)' },
    { kpi:'Unforced Loss',   cat:'cat-grey',   name:'Unforced\nLoss'   },
    { kpi:'Free Win',        cat:'cat-purple', name:'Free Win'         },
    { kpi:'Free Lost',       cat:'cat-grey',   name:'Free Lost'        },
    { kpi:'Run thru 65',     cat:'cat-yellow', name:'Run\nThru 65'     },
    { kpi:'Card for Us',     cat:'cat-red',    name:'Card\nFor Us'     },
  ]},
];

const KPI_COLOUR = {
  'Point – Play (Us)':'#00e676','Miss – Play (Us)':'#ffe082',
  'Point – Free (Us)':'#00e676','Miss – Free (Us)':'#ffe082','Goal – Us':'#00e676',
  'Point – Play (Them)':'#ff3d5a','Miss – Play (Them)':'#ffab40',
  'Point – Free (Them)':'#ff3d5a','Miss – Free (Them)':'#ffab40','Goal – Them':'#ff3d5a',
  'Our PO – We Win':'#b388ff','Our PO – We Lose':'#ff3d5a',
  'Their PO – We Win':'#b388ff','Their PO – We Lose':'#ff3d5a',
  'T/O Forced (Us)':'#00d4ff','Contested Win':'#00d4ff','Contested Loss':'#8a9bb5',
  'Run thru 65':'#ffe082','Unforced Loss':'#8a9bb5',
  'Free Win':'#b388ff','Free Lost':'#8a9bb5','Card for Us':'#ff3d5a',
};

// ── STATE ─────────────────────────────────────────────────────────────────
let counts   = {};
let eventLog = [];
let curTab   = 0;
let gameFlow = 'pre';
let paused   = false;
let clockStart = null, clockOffset = 0, clockInterval = null;

TABS_DATA.forEach(t => t.btns.forEach(b => counts[b.kpi] = 0));

// ── BUILD PAGES ───────────────────────────────────────────────────────────
function buildPages() {
  const track = document.getElementById('swipe-track');
  const hint  = document.getElementById('swipe-hint');
  track.innerHTML = '';
  hint.innerHTML  = '';

  TABS_DATA.forEach((tab, ti) => {
    const page = document.createElement('div');
    page.className = 'swipe-page';
    page.dataset.pageIdx = ti;

    tab.btns.forEach(b => {
      const lines = b.name.split('\n');
      const btn = document.createElement('div');
      btn.className = `evt-btn ${b.cat}`;
      btn.dataset.kpi = b.kpi;
      btn.innerHTML = `
        <div class="zone-thirds">
          <div class="z3 zl" data-zone="Left"></div>
          <div class="z3 zm" data-zone="Centre"></div>
          <div class="z3 zr" data-zone="Right"></div>
        </div>
        <div class="btn-content">
          <div class="btn-count" id="cnt-${b.kpi.replace(/\W+/g,'_')}">${counts[b.kpi]}</div>
          <div class="btn-divider"></div>
          <div class="btn-info">
            <div class="btn-name">${lines[0]}${lines[1]?'<br>'+lines[1]:''}</div>
            <div class="btn-zone-row">
              <span class="zone-lbl" data-z="Left">◄ L</span>
              <span class="zone-lbl" data-z="Centre">● C</span>
              <span class="zone-lbl" data-z="Right">R ►</span>
            </div>
          </div>
        </div>`;
      page.appendChild(btn);
    });

    track.appendChild(page);

    // Dot indicator
    const dot = document.createElement('div');
    dot.className = 'hint-dot' + (ti === 0 ? ' active' : '');
    dot.dataset.dotIdx = ti;
    hint.appendChild(dot);
  });

  setTrackPosition(0, false);
  setupGestures();
}

function setTrackPosition(tabIdx, animate) {
  const track = document.getElementById('swipe-track');
  track.style.transition = animate
    ? 'transform 0.28s cubic-bezier(0.4,0,0.2,1)'
    : 'none';
  track.style.transform = `translateX(${-tabIdx * 100}%)`;
  document.querySelectorAll('.hint-dot').forEach((d, i) =>
    d.classList.toggle('active', i === tabIdx));
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', i === tabIdx));
}

function goToTab(idx) {
  curTab = idx;
  setTrackPosition(idx, true);
}

// ── GESTURE ENGINE ────────────────────────────────────────────────────────
// Intent states: null | 'pending' | 'swipe' | 'button'
let gesture = null;

function setupGestures() {
  const vp = document.getElementById('swipe-viewport');

  vp.addEventListener('touchstart', onTouchStart, { passive: false });
  vp.addEventListener('touchmove',  onTouchMove,  { passive: false });
  vp.addEventListener('touchend',   onTouchEnd,   { passive: false });
  vp.addEventListener('touchcancel',onTouchCancel,{ passive: false });

  // Mouse fallback for desktop preview
  vp.addEventListener('mousedown', onMouseDown);
  vp.addEventListener('mousemove', onMouseMove);
  vp.addEventListener('mouseup',   onMouseUp);
  vp.addEventListener('mouseleave',onMouseCancel);
}

function startGesture(clientX, clientY, target) {
  const btn = target.closest('.evt-btn');
  gesture = {
    startX: clientX, startY: clientY,
    currentX: clientX,
    btn: btn || null,
    intent: 'pending',  // pending | swipe | button
    zone: null,
    trackBaseX: -curTab * 100,  // percent
  };
}

function moveGesture(clientX, clientY) {
  if (!gesture) return;
  const dx = clientX - gesture.startX;
  const dy = clientY - gesture.startY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  gesture.currentX = clientX;

  if (gesture.intent === 'pending') {
    if (dist < DEAD_ZONE) return; // wait

    // Determine intent by angle from horizontal
    const angleDeg = Math.abs(Math.atan2(Math.abs(dy), Math.abs(dx)) * 180 / Math.PI);
    if (angleDeg < ANGLE_LOCK) {
      // Clearly horizontal — swipe intent
      gesture.intent = 'swipe';
      // Clear any button highlight
      if (gesture.btn) clearZones(gesture.btn);
      showIntentBadge('SWIPE →');
    } else {
      // Clearly vertical or diagonal — button intent
      gesture.intent = 'button';
      showIntentBadge('BUTTON ●');
    }
  }

  if (gesture.intent === 'swipe') {
    // Live drag the track
    const vw = document.getElementById('swipe-viewport').offsetWidth;
    const dragPct = (dx / vw) * 100;
    const track = document.getElementById('swipe-track');
    track.style.transition = 'none';
    // Clamp with rubber-band at edges
    let targetPct = gesture.trackBaseX + dragPct;
    const minPct  = -(TABS_DATA.length - 1) * 100;
    if (targetPct > 0)      targetPct = targetPct * 0.25;
    if (targetPct < minPct) targetPct = minPct + (targetPct - minPct) * 0.25;
    track.style.transform = `translateX(${targetPct}%)`;
  }

  if (gesture.intent === 'button' && gesture.btn) {
    const zone = getZone(gesture.btn, clientX);
    gesture.zone = zone;
    highlightZone(gesture.btn, zone);
  }
}

function endGesture(clientX) {
  if (!gesture) return;
  const dx = clientX - gesture.startX;

  if (gesture.intent === 'swipe') {
    // Decide which tab to snap to
    let newTab = curTab;
    if (dx < -SWIPE_THRESHOLD && curTab < TABS_DATA.length - 1) newTab = curTab + 1;
    if (dx >  SWIPE_THRESHOLD && curTab > 0)                    newTab = curTab - 1;
    curTab = newTab;
    setTrackPosition(curTab, true);
    if (newTab !== (gesture.trackBaseX / -100 | 0)) {
      if (navigator.vibrate) navigator.vibrate([8, 0, 8]);
    }
    showIntentBadge('');
  }

  if (gesture.intent === 'button' && gesture.btn) {
    const zone = gesture.zone || getZone(gesture.btn, clientX);
    clearZones(gesture.btn);
    fireEvent(gesture.btn, zone);
    showIntentBadge('');
  }

  if (gesture.intent === 'pending' && gesture.btn) {
    // Tap with no movement — fire as centre
    clearZones(gesture.btn);
    fireEvent(gesture.btn, 'Centre');
    showIntentBadge('');
  }

  gesture = null;
}

function cancelGesture() {
  if (!gesture) return;
  if (gesture.intent === 'swipe') setTrackPosition(curTab, true);
  if (gesture.btn) clearZones(gesture.btn);
  showIntentBadge('');
  gesture = null;
}

// Touch handlers
function onTouchStart(e) {
  if (e.touches.length > 1) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  startGesture(t.clientX, t.clientY, t.target);
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  moveGesture(t.clientX, t.clientY);
}
function onTouchEnd(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  endGesture(t.clientX);
}
function onTouchCancel() { cancelGesture(); }

// Mouse handlers (desktop preview)
let mouseDown = false;
function onMouseDown(e) { mouseDown = true; startGesture(e.clientX, e.clientY, e.target); }
function onMouseMove(e) { if (mouseDown) moveGesture(e.clientX, e.clientY); }
function onMouseUp(e)   { if (mouseDown) { mouseDown = false; endGesture(e.clientX); } }
function onMouseCancel(){ if (mouseDown) { mouseDown = false; cancelGesture(); } }

// ── ZONE HELPERS ──────────────────────────────────────────────────────────
function getZone(btn, clientX) {
  const r   = btn.getBoundingClientRect();
  const rel = (clientX - r.left) / r.width;
  return rel < ZONE_SPLIT_L ? 'Left' : rel < ZONE_SPLIT_R ? 'Centre' : 'Right';
}
function highlightZone(btn, zone) {
  btn.querySelectorAll('.z3').forEach(z =>
    z.classList.toggle('active', z.dataset.zone === zone));
  btn.querySelectorAll('.zone-lbl').forEach(l =>
    l.classList.toggle('active', l.dataset.z === zone));
}
function clearZones(btn) {
  btn.querySelectorAll('.z3,.zone-lbl').forEach(el => el.classList.remove('active'));
}

// ── FIRE EVENT ────────────────────────────────────────────────────────────
function fireEvent(btn, zone) {
  if (gameFlow === 'pre') startGame();
  if (paused)              { showToast('Paused — tap ▶ Resume first'); return; }
  if (gameFlow === 'half_time') { showToast('Half Time — tap ▶ 2nd Half'); return; }
  if (gameFlow === 'ended')     { showToast('Full Time'); return; }

  const kpi = btn.dataset.kpi;
  counts[kpi]++;
  eventLog.push({ kpi, zone, quarter: getQuarter(), time: document.getElementById('clock').textContent });

  // Animate
  btn.style.transform = 'scale(0.93)';
  setTimeout(() => { btn.style.transform = 'scale(1.03)'; }, 90);
  setTimeout(() => { btn.style.transform = ''; }, 200);
  if (navigator.vibrate) navigator.vibrate(18);

  const el = document.getElementById('cnt-' + kpi.replace(/\W+/g,'_'));
  if (el) el.textContent = counts[kpi];
  updateScoreboard();
  updateLastEvent(kpi, zone);
  showToast(`✓ ${kpi.replace(' – ',' ')} · ${zone === 'Left' ? '◄ L' : zone === 'Centre' ? '● C' : 'R ►'}`);
}

// ── SCOREBOARD ────────────────────────────────────────────────────────────
function updateScoreboard() {
  const gU = counts['Goal – Us']||0;
  const pU = (counts['Point – Play (Us)']||0) + (counts['Point – Free (Us)']||0);
  const gT = counts['Goal – Them']||0;
  const pT = (counts['Point – Play (Them)']||0) + (counts['Point – Free (Them)']||0);
  document.getElementById('score-us').textContent      = `${gU}-${pU.toString().padStart(2,'0')}`;
  document.getElementById('score-us-pts').textContent  = `(${gU*3+pU})`;
  document.getElementById('score-them').textContent    = `${gT}-${pT.toString().padStart(2,'0')}`;
  document.getElementById('score-them-pts').textContent= `(${gT*3+pT})`;
}

function updateLastEvent(kpi, zone) {
  const colour = KPI_COLOUR[kpi]||'#6b7a99';
  const dot = document.getElementById('le-dot');
  dot.style.display = 'block';
  dot.style.background = colour;
  const sym = zone === 'Left' ? '◄' : zone === 'Centre' ? '●' : '►';
  document.getElementById('le-text').textContent = `${kpi.replace(' – ',' ')} · ${sym}`;
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────
function getQuarter() {
  const s = getSeconds();
  if (gameFlow === 'first_half' || gameFlow === 'half_time') return s < 15*60 ? 1 : 2;
  return s < 15*60 ? 3 : 4;
}
function getSeconds() {
  if (!clockStart) return 0;
  return Math.floor((clockOffset + (paused ? 0 : Date.now() - clockStart)) / 1000);
}

function startGame() {
  gameFlow = 'first_half';
  clockStart = Date.now(); clockOffset = 0; paused = false;
  setFlowBtn('⏸','Half','rgba(255,171,64,0.12)','rgba(255,171,64,0.5)','var(--amber)');
  clockInterval = setInterval(tickClock, 500);
  showToast('🏁 Kick-off — 1st Half');
}

function tickClock() {
  if (paused) return;
  const base = gameFlow === 'second_half' ? 30*60 + getSeconds() : getSeconds();
  const m = Math.floor(base/60).toString().padStart(2,'0');
  const s = (base%60).toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${m}:${s}`;
  const rawS = getSeconds();
  let q;
  if (gameFlow === 'first_half')  { q = rawS < 15*60 ? 1 : 2; document.getElementById('qtr-label').textContent = `Quarter ${q}`; }
  else if (gameFlow === 'half_time')  { q = 2; document.getElementById('qtr-label').textContent = 'Half Time'; }
  else if (gameFlow === 'second_half'){ q = rawS < 15*60 ? 3 : 4; document.getElementById('qtr-label').textContent = `Quarter ${q}`; }
  else { q = 4; document.getElementById('qtr-label').textContent = 'Full Time'; }
  document.getElementById('match-status').textContent = paused ? 'Paused' : 'Live';
  for (let i = 1; i <= 4; i++) {
    document.getElementById(`q${i}`).classList.toggle('active', i === q);
    document.getElementById(`q${i}`).classList.toggle('done',   i <  q);
  }
}

function handleFlow() {
  if (gameFlow === 'pre')         { startGame(); return; }
  if (gameFlow === 'first_half')  {
    clockOffset += Date.now() - clockStart; clockStart = null;
    gameFlow = 'half_time';
    setFlowBtn('▶','2nd Half','rgba(0,212,255,0.12)','rgba(0,212,255,0.5)','var(--accent)');
    document.getElementById('qtr-label').textContent  = 'Half Time';
    document.getElementById('match-status').textContent = 'Half Time';
    showToast('⏸ Half Time'); return;
  }
  if (gameFlow === 'half_time') {
    gameFlow = 'second_half';
    clockStart = Date.now(); clockOffset = 0; paused = false;
    setFlowBtn('⏹','End','rgba(255,61,90,0.12)','rgba(255,61,90,0.5)','var(--red)');
    showToast('▶ 2nd Half'); return;
  }
  if (gameFlow === 'second_half') {
    gameFlow = 'ended';
    clearInterval(clockInterval);
    setFlowBtn('—','FT','rgba(107,122,153,0.08)','rgba(107,122,153,0.3)','var(--text-dim)');
    document.getElementById('match-status').textContent = 'Full Time';
    showToast('⏹ Full Time'); return;
  }
}

function handlePause() {
  if (gameFlow !== 'first_half' && gameFlow !== 'second_half') {
    showToast('Can only pause during active play'); return;
  }
  if (paused) {
    clockStart = Date.now(); paused = false;
    const pb = document.getElementById('t-pause');
    pb.innerHTML = '<span class="tool-icon">⏸</span><span class="tool-lbl">Pause</span>';
    showToast('▶ Resumed');
  } else {
    clockOffset += Date.now() - clockStart; clockStart = null; paused = true;
    const pb = document.getElementById('t-pause');
    pb.innerHTML = '<span class="tool-icon">▶</span><span class="tool-lbl">Resume</span>';
    showToast('⏸ Paused');
  }
}

function handleUndo() {
  if (eventLog.length === 0) { showToast('Nothing to undo'); return; }
  const last = eventLog.pop();
  counts[last.kpi] = Math.max(0, (counts[last.kpi]||1) - 1);
  const el = document.getElementById('cnt-' + last.kpi.replace(/\W+/g,'_'));
  if (el) el.textContent = counts[last.kpi];
  updateScoreboard();
  showToast(`↩ Undid: ${last.kpi} [${last.zone}]`);
}

function setFlowBtn(icon, lbl, bg, bc, c) {
  const b = document.getElementById('t-flow');
  b.innerHTML = `<span class="tool-icon">${icon}</span><span class="tool-lbl">${lbl}</span>`;
  b.style.background = bg; b.style.borderColor = bc; b.style.color = c;
}

// ── INTENT DEBUG BADGE ────────────────────────────────────────────────────
let intentTimer;
function showIntentBadge(msg) {
  const b = document.getElementById('intent-badge');
  if (!msg) { b.classList.remove('show'); return; }
  b.textContent = msg; b.classList.add('show');
  clearTimeout(intentTimer);
  intentTimer = setTimeout(() => b.classList.remove('show'), 900);
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildPages();
</script>
